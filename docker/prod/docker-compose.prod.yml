services:
  postgres:
    env_file:
      - ../../.env
    image: pgvector/pgvector:pg16
    container_name: mindscribe-postgres-prod
    restart: unless-stopped
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
      - ../init-pgvector.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    networks:
      - mindscribe-network

  litellm:
    env_file: &workspace-env-file
      - ../../.env
    image: ghcr.io/berriai/litellm:main-stable
    container_name: mindscribe-litellm-prod
    restart: unless-stopped
    command:
      ["--config", "/app/config.yaml", "--port", "4000", "--host", "0.0.0.0"]
    expose:
      - "4000"
    volumes:
      - ../litellm/config.yaml:/app/config.yaml:ro
    networks:
      - mindscribe-network

  api:
    env_file: *workspace-env-file
    build:
      context: ../..
      dockerfile: ./docker/prod/Dockerfile.api.prod
    container_name: mindscribe-api-prod
    restart: unless-stopped
    environment:
      NODE_ENV: production
      MINDSCRIBE_RUNTIME: docker
      PORT: 8000
      BACKEND_URL: ${BACKEND_URL:-http://localhost/api}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      LLM_BASE_URL: ${LLM_BASE_URL:-http://litellm:4000/v1}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
      litellm:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - mindscribe-network
    healthcheck:
      test:
        [
          "CMD",
          "bun",
          "-e",
          "fetch('http://127.0.0.1:8000/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  web:
    env_file: *workspace-env-file
    build:
      context: ../..
      dockerfile: ./docker/prod/Dockerfile.web.prod
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID:-}
        VITE_GITHUB_CLIENT_ID: ${VITE_GITHUB_CLIENT_ID:-}
    container_name: mindscribe-web-prod
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - mindscribe-network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --quiet --tries=1 --spider http://127.0.0.1/ || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  postgres_prod_data:
    driver: local

networks:
  mindscribe-network:
    driver: bridge
