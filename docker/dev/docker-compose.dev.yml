services:
  postgres:
    env_file:
      - ../../.env
    image: pgvector/pgvector:pg16
    container_name: meshmind-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../init-pgvector.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    networks:
      - meshmind-network

  litellm:
    env_file: &workspace-env-file
      - ../../.env
    image: ghcr.io/berriai/litellm:main-stable
    container_name: meshmind-litellm
    restart: unless-stopped
    command:
      ["--config", "/app/config.yaml", "--port", "4000", "--host", "0.0.0.0"]
    ports:
      - "4000:4000"
    volumes:
      - ../litellm/config.yaml:/app/config.yaml:ro
    networks:
      - meshmind-network

  api:
    env_file: *workspace-env-file
    build:
      context: ../..
      dockerfile: ./docker/dev/Dockerfile.api.dev
    container_name: meshmind-api
    init: true
    working_dir: /app/apps/api
    command: bun run dev
    environment: &workspace-environment
      NODE_ENV: development
      MESHMIND_RUNTIME: docker
      PORT: ${PORT:-8000}
      BACKEND_URL: ${BACKEND_URL:-http://localhost:8000}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      LLM_BASE_URL: ${LLM_BASE_URL:-http://litellm:4000/v1}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    ports:
      - "8000:8000"
    depends_on: &workspace-depends-on
      postgres:
        condition: service_healthy
      litellm:
        condition: service_started
    volumes: &workspace-volumes
      - ../..:/app
      - meshmind_node_modules:/app/node_modules
      - bun_install_cache:/root/.bun/install/cache
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - meshmind-network
    healthcheck:
      test:
        [
          "CMD",
          "bun",
          "-e",
          "fetch('http://127.0.0.1:8000/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  web:
    env_file: *workspace-env-file
    build:
      context: ../..
      dockerfile: ./docker/dev/Dockerfile.web.dev
    container_name: meshmind-web
    init: true
    working_dir: /app/apps/web
    command: bun run dev --host 0.0.0.0 --port 3000
    environment:
      <<: *workspace-environment
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    volumes: *workspace-volumes
    networks:
      - meshmind-network
    healthcheck:
      test:
        [
          "CMD",
          "bun",
          "-e",
          "fetch('http://127.0.0.1:3000').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  workspace-dev:
    env_file: *workspace-env-file
    build:
      context: ../..
      dockerfile: ./docker/dev/Dockerfile.api.dev
    container_name: meshmind-workspace-dev
    working_dir: /app
    command: bun run dev
    environment: *workspace-environment
    depends_on: *workspace-depends-on
    volumes: *workspace-volumes
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - meshmind-network
    profiles: ["commands"]
    ports:
      - "8000:8000"
      - "3000:3000"

  build:
    env_file: *workspace-env-file
    build:
      context: ../..
      dockerfile: ./docker/dev/Dockerfile.api.dev
    container_name: meshmind-build
    working_dir: /app
    command: bun run build
    environment: *workspace-environment
    depends_on: *workspace-depends-on
    volumes: *workspace-volumes
    networks:
      - meshmind-network
    profiles: ["commands"]

  lint:
    env_file: *workspace-env-file
    build:
      context: ../..
      dockerfile: ./docker/dev/Dockerfile.api.dev
    container_name: meshmind-lint
    working_dir: /app
    command: bun run lint
    environment: *workspace-environment
    depends_on: *workspace-depends-on
    volumes: *workspace-volumes
    networks:
      - meshmind-network
    profiles: ["commands"]

  format:
    env_file: *workspace-env-file
    build:
      context: ../..
      dockerfile: ./docker/dev/Dockerfile.api.dev
    container_name: meshmind-format
    working_dir: /app
    command: bun run format
    environment: *workspace-environment
    depends_on: *workspace-depends-on
    volumes: *workspace-volumes
    networks:
      - meshmind-network
    profiles: ["commands"]

  type-check:
    env_file: *workspace-env-file
    build:
      context: ../..
      dockerfile: ./docker/dev/Dockerfile.api.dev
    container_name: meshmind-type-check
    working_dir: /app
    command: bun run type-check
    environment: *workspace-environment
    depends_on: *workspace-depends-on
    volumes: *workspace-volumes
    networks:
      - meshmind-network
    profiles: ["commands"]

  clean:
    env_file: *workspace-env-file
    build:
      context: ../..
      dockerfile: ./docker/dev/Dockerfile.api.dev
    container_name: meshmind-clean
    working_dir: /app
    command: bun run clean
    environment: *workspace-environment
    depends_on: *workspace-depends-on
    volumes: *workspace-volumes
    networks:
      - meshmind-network
    profiles: ["commands"]

  db-generate:
    env_file: *workspace-env-file
    build:
      context: ../..
      dockerfile: ./docker/dev/Dockerfile.api.dev
    container_name: meshmind-db-generate
    working_dir: /app
    command: bun run --filter=@meshmind/database db:generate
    environment: *workspace-environment
    depends_on: *workspace-depends-on
    volumes: *workspace-volumes
    networks:
      - meshmind-network
    profiles: ["commands"]

  db-push:
    env_file: *workspace-env-file
    build:
      context: ../..
      dockerfile: ./docker/dev/Dockerfile.api.dev
    container_name: meshmind-db-push
    working_dir: /app
    command: bun run --filter=@meshmind/database db:push
    environment: *workspace-environment
    depends_on: *workspace-depends-on
    volumes: *workspace-volumes
    networks:
      - meshmind-network
    profiles: ["commands"]

  db-studio:
    env_file: *workspace-env-file
    build:
      context: ../..
      dockerfile: ./docker/dev/Dockerfile.api.dev
    container_name: meshmind-db-studio
    working_dir: /app
    command: bun run --filter=@meshmind/database db:studio --host 0.0.0.0 --port 4983
    environment: *workspace-environment
    depends_on: *workspace-depends-on
    volumes: *workspace-volumes
    networks:
      - meshmind-network
    profiles: ["commands"]
    ports:
      - "4983:4983"

volumes:
  postgres_data:
    driver: local
  meshmind_node_modules:
  bun_install_cache:

networks:
  meshmind-network:
    driver: bridge
